<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TableTurn 管理面板</title>
<style>
body{font-family:-apple-system,system-ui,sans-serif;max-width:960px;margin:24px auto;padding:0 20px;color:#111827;background:#f0f2f5}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px}
h2{font-size:18px;margin-bottom:12px}h3{font-size:15px;margin-bottom:8px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-box{background:#f9fafb;border-radius:8px;padding:14px 16px;text-align:center}
.stat-box .num{font-size:26px;font-weight:800;color:#4f46e5}
.stat-box .lbl{font-size:11px;color:#6b7280;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f9fafb;padding:8px 12px;text-align:left;border-bottom:2px solid #e5e7eb;font-size:11px}
td{padding:7px 12px;border-bottom:1px solid #f3f4f6}
input{padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}
button{padding:10px 20px;background:#4f46e5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
.hidden{display:none!important}
.chart-row{display:flex;gap:4px;align-items:end;height:120px;padding:8px 0}
.chart-bar{flex:1;background:#4f46e5;border-radius:4px 4px 0 0;min-height:2px;position:relative}
.chart-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap}
.chart-bar:hover .tip{display:block}
.actions{display:flex;gap:8px;margin-top:12px}
</style>
</head>
<body>
<div id="login-box" style="text-align:center;padding:60px 0">
  <h2>管理员登录</h2>
  <input type="password" id="pwd" placeholder="密码"><br><br>
  <button onclick="login()">登录</button>
</div>

<div id="stats-area" class="hidden">
  <h2>TableTurn 管理面板</h2>
  <div id="cards"></div>
  <div class="stat-row" id="today-stats"></div>
  <div class="card">
    <h3>近 7 天访问量</h3>
    <div id="visit-chart" class="chart-row"></div>
  </div>
  <div class="card">
    <h3>最近操作</h3>
    <table id="recent"><thead><tr><th>时间</th><th>操作</th><th>用户</th><th>费用</th></tr></thead><tbody></tbody></table>
  </div>
  <div class="card">
    <h3>用户</h3>
    <table id="users"><thead><tr><th>ID</th><th>邮箱</th><th>余额</th><th>已验证</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<script>
var token = '';
function login() {
  token = document.getElementById('pwd').value;
  loadAll();
}
async function loadAll() {
  var h = { 'x-admin-token': token };
  var r1 = await fetch('/api/admin/stats', { headers: h });
  var r2 = await fetch('/api/admin/analytics', { headers: h });
  if (!r1.ok) { alert('密码错误'); return; }
  var s = await r1.json();
  var a = await r2.json();

  document.getElementById('login-box').className = 'hidden';
  document.getElementById('stats-area').className = '';

  // Overview
  document.getElementById('cards').innerHTML =
    '<div class="card"><h3>Overview</h3><div class="stat-row">' +
    box('总用户', s.totalUsers) + box('已验证', s.verifiedUsers) +
    box('24h活跃', a ? a.activeUsers24h : '-') + box('总余额', '$' + s.totalBalance) +
    '</div></div>' +
    '<div class="card"><h3>本月营收</h3><div class="stat-row">' +
    box('收入', '$' + s.monthlyRevenue) + box('成本', '$' + s.monthlyWholesale) +
    box('利润', '$' + s.monthlyProfit) + box('利润率', s.margin + '%') +
    '</div></div>';

  // Today
  if (a) {
    document.getElementById('today-stats').innerHTML =
      box('今日PV', a.today.pageviews) + box('今日UV', a.today.uniqueVisitors) +
      box('翻译次数', a.today.translations) + box('清洗次数', a.today.cleanings);

    // Chart
    var max = 1;
    a.visitChart.forEach(function(d) { if (d.pv > max) max = d.pv; });
    var bars = '';
    a.visitChart.forEach(function(d) {
      bars += '<div class="chart-bar" style="height:' + (d.pv / max * 100) + '%"><div class="tip">' + d.date + ': ' + d.pv + ' PV / ' + d.uv + ' UV</div></div>';
    });
    document.getElementById('visit-chart').innerHTML = bars;

    // Recent
    var rows = '';
    a.recentActions.forEach(function(u) {
      rows += '<tr><td>' + u.time + '</td><td>' + u.action + '</td><td>' + u.userId + '</td><td>$' + (u.cost || 0).toFixed(4) + '</td></tr>';
    });
    document.getElementById('recent').querySelector('tbody').innerHTML = rows || '<tr><td colspan="4">暂无记录</td></tr>';
  }

  // Users
  var urows = '';
  s.topUsers.forEach(function(u) {
    urows += '<tr><td>' + u.id + '</td><td>' + u.email + '</td><td>$' + (u.balance || 0).toFixed(2) + '</td><td>' + (u.emailVerified ? '是' : '否') + '</td></tr>';
  });
  document.getElementById('users').querySelector('tbody').innerHTML = urows;
}
function box(label, value) {
  return '<div class="stat-box"><div class="num">' + value + '</div><div class="lbl">' + label + '</div></div>';
}
</script>
</body>
</html>
